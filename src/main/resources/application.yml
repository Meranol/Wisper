server:
  port: 8089
  servlet:
    context-path: /

spring:
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

  datasource:
    url: jdbc:mysql://localhost:3306/wisper?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&characterEncoding=utf8
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
    type: com.zaxxer.hikari.HikariDataSource
    hikari:
      maximum-pool-size: 50
      minimum-idle: 10
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: lb://auth-service
          predicates:
            - Path=/api/auth/**
          filters:
            - name: CircuitBreaker
              args:
                name: authService

        - id: business-service
          uri: lb://business-service
          predicates:
            - Path=/api/**
          filters:
            - TokenRelay
            - name: JwtAuth
              args:
                permit-paths:
                  - /api/auth/login
                  - /api/auth/register
                  - /api/public/**

  redis:
    host: localhost
    port: 6379
    lettuce:
      pool:
        max-active: 8
        max-idle: 8
        min-idle: 0
        max-wait: -1
    notify-keyspace-events: Ex

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.example.wisper_one.Login.domain
  configuration:
    map-underscore-to-camel-case: true